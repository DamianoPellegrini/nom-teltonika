name: Informational benchmarks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  criterion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install profiling tools
        run: sudo apt-get update && sudo apt-get install --yes valgrind strace time
      - run: cargo bench --bench parser -- --output-format bencher | tee benchmark.txt
      - name: Record memory, allocations, and syscalls
        run: |
          cargo build --release --example from_buffer
          /usr/bin/time --verbose target/release/examples/from_buffer 2> memory.txt
          valgrind --tool=massif --massif-out-file=massif.out target/release/examples/from_buffer
          ms_print massif.out > allocations.txt
          strace --summary target/release/examples/from_buffer 2> syscalls.txt
      - uses: actions/upload-artifact@v6
        with:
          name: criterion-benchmark
          path: |
            benchmark.txt
            allocations.txt
            memory.txt
            syscalls.txt
            massif.out
            target/criterion
